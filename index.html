<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溫室花花實驗室 - 雲端簽核管理系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #F8F8F5;      /* 溫潤和紙白 */
            --ink-black: #2A2A2A;    /* 炭黑 */
            --text-dark-grey: #5A5A55; /* 優雅深灰 */
            --moss-green: #556655;   /* 靜謐苔綠 */
            --border-line: #E0E0D8;  /* 結構輕格線 */
            --white: #FFFFFF;
            --mist-grey: #989890;    /* 霧灰 */
            --danger-text: #B85C5C;  /* 淡雅紅 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; letter-spacing: 0.5px; }
        body { background-color: var(--bg-base); color: var(--ink-black); max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; border-left: 1px solid var(--border-line); border-right: 1px solid var(--border-line); }

        /* 大量留白、優雅字體粗細與極簡底線 */
        .form-group { margin-bottom: 28px; position: relative; }
        .form-label { display: block; font-size: 0.72rem; color: var(--moss-green); text-transform: uppercase; margin-bottom: 8px; font-weight: 500; padding-left: 2px; letter-spacing: 0.8px; }
        
        .form-control { width: 100%; padding: 10px 4px; background: transparent; border: none; border-bottom: 1px solid var(--border-line); border-radius: 0; font-size: 0.92rem; color: var(--ink-black); transition: all 0.3s; outline: none; }
        .form-control:focus { border-bottom-color: var(--moss-green); }
        
        /* 下拉式選單文字：使用深灰，不使用黑色 */
        select.form-control { 
            color: var(--text-dark-grey); 
            appearance: none; 
            -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%235A5A55'/></svg>"); 
            background-repeat: no-repeat; 
            background-position: right 8px center; 
            cursor: pointer; 
        }
        select.form-control.selected { color: var(--ink-black); }

        /* 夾帶檔案極簡設計 */
        .file-upload-wrapper { margin-top: 8px; position: relative; }
        .file-label { display: inline-flex; align-items: center; font-size: 0.75rem; color: var(--moss-green); cursor: pointer; text-decoration: underline; }
        .file-input { display: none; }
        .file-preview-area { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border: 1px solid var(--border-line); padding: 2px; background: var(--white); }

        /* 按鈕系統 */
        .btn-flat { width: 100%; padding: 14px; background: var(--moss-green); color: var(--white); border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .btn-flat:active { background: #425242; }
        .btn-action-link { font-size: 0.78rem; margin-left: 10px; background: none; border: none; color: var(--moss-green); text-decoration: underline; cursor: pointer; }
        .btn-action-danger { color: var(--danger-text); }

        /* 登入畫面 */
        .login-screen { padding: 60px 30px; display: flex; flex-direction: column; justify-content: center; flex-grow: 1; background: var(--bg-base); }
        .login-brand { text-align: center; margin-bottom: 50px; }
        .brand-main { font-family: 'Noto Serif TC', serif; font-size: 1.65rem; font-weight: 700; color: var(--ink-black); margin-bottom: 4px; letter-spacing: 2px; }
        .brand-sub { font-family: 'Noto Serif TC', serif; font-size: 0.95rem; color: var(--moss-green); margin-bottom: 12px; letter-spacing: 1px; }
        .brand-badge { font-size: 0.75rem; color: var(--mist-grey); border-top: 1px solid var(--border-line); display: inline-block; padding-top: 8px; width: 60%; }
        .user-greeting { font-size: 0.88rem; color: var(--moss-green); margin-top: 16px; min-height: 22px; font-weight: 700; text-align: center; letter-spacing: 1px; }

        /* 主畫面與頂部標題 */
        .main-screen { display: none; flex-direction: column; flex-grow: 1; }
        header { padding: 24px 20px; border-bottom: 1px solid var(--border-line); background: var(--white); position: relative; text-align: center; }
        .header-main { font-family: 'Noto Serif TC', serif; font-size: 1.35rem; font-weight: 700; color: var(--ink-black); }
        .header-sub { font-family: 'Noto Serif TC', serif; font-size: 0.85rem; color: var(--moss-green); letter-spacing: 1px; margin-top: 2px; }
        .header-badge { font-size: 0.7rem; color: var(--mist-grey); margin-top: 4px; letter-spacing: 0.5px; }
        .logout-link { position: absolute; top: 24px; right: 20px; font-size: 0.75rem; color: var(--mist-grey); text-decoration: underline; cursor: pointer; }

        /* 使用畫面資訊列：不顯示身分，最右側固定 💎 */
        .identity-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; color: var(--mist-grey); padding: 12px 20px; background: var(--bg-base); border-bottom: 1px solid var(--border-line); }
        .identity-user { color: var(--ink-black); font-weight: 500; }

        /* 頂部按鈕切換分頁列 */
        nav { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border-line); background: var(--white); }
        nav.three-tabs { grid-template-columns: repeat(3, 1fr); }
        .nav-tab { padding: 14px 0; text-align: center; font-size: 0.8rem; color: var(--mist-grey); cursor: pointer; border-right: 1px solid var(--border-line); font-weight: 500; }
        .nav-tab:last-child { border-right: none; }
        .nav-tab.active { color: var(--ink-black); background: var(--bg-base); font-weight: 700; position: relative; }
        .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--moss-green); }

        /* 卡片包覆塊與優雅色塊 */
        .content-panel { padding: 24px 20px; display: none; flex-grow: 1; }
        .content-panel.active { display: block; }
        .panel-header { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; padding-bottom: 8px; border-bottom: 1px solid var(--ink-black); display: flex; justify-content: space-between; align-items: center; }
        .card-node { background: var(--white); border: 1px solid var(--border-line); padding: 20px 18px; margin-bottom: 18px; }

        /* NEWS：Comments 區塊 */
        .news-item { padding: 16px 0; border-bottom: 1px dashed var(--border-line); }
        .news-item:last-child { border: none; }
        .news-meta { font-size: 0.75rem; color: var(--mist-grey); margin-bottom: 6px; display: flex; justify-content: space-between; }
        .news-body { font-size: 0.9rem; line-height: 1.6; color: var(--ink-black); margin-bottom: 12px; }
        
        .comment-container { background: var(--bg-base); padding: 12px; margin-top: 12px; }
        .comment-title { font-size: 0.72rem; font-weight: 700; color: var(--moss-green); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .comment-line { font-size: 0.8rem; margin-bottom: 8px; border-bottom: 1px dotted #E0E0D8; padding-bottom: 6px; line-height: 1.4; }
        .comment-line:last-child { margin-bottom: 0; border: none; padding-bottom: 0; }
        .comment-user { font-weight: 700; color: var(--ink-black); }
        .comment-reply { color: #555; padding-left: 10px; border-left: 2px solid var(--moss-green); margin-top: 4px; font-size: 0.78rem; background: #EDF0ED; padding-top: 4px; padding-bottom: 4px; }
        
        .comment-input-group { display: flex; gap: 8px; margin-top: 12px; }
        .comment-input-group .form-control { padding: 6px; font-size: 0.8rem; border: 1px solid var(--border-line); background: var(--white); }

        /* 全狀態事件足跡 */
        .filter-group { margin-bottom: 20px; }
        .event-node { border-bottom: 1px solid var(--border-line); padding: 18px 0; font-size: 0.88rem; }
        .event-node:last-child { border: none; }
        .event-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .event-user { font-weight: 700; }
        .event-status { font-size: 0.8rem; font-weight: 700; }
        .event-detail { color: #3A3A3A; line-height: 1.6; margin-bottom: 8px; font-size: 0.86rem; }
        .event-time { font-size: 0.75rem; color: var(--mist-grey); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

        /* 管理名冊格線對齊核心樣式 */
        .partner-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px dashed var(--border-line); }
        .partner-fields { display: flex; gap: 12px; flex-grow: 1; margin-right: 12px; }
        .partner-fields .form-control { padding: 6px 4px; font-size: 0.85rem; border-bottom: 1px solid var(--border-line); margin-bottom: 0; }

        footer { text-align: center; font-size: 0.7rem; color: var(--mist-grey); padding: 30px 15px; background: var(--bg-base); border-top: 1px solid var(--border-line); margin-top: auto; }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-brand">
            <div class="brand-main">溫室花花實驗室</div>
            <div class="brand-sub">Sincerely Yours</div>
            <div class="brand-badge">雲端簽核管理系統</div>
        </div>

        <div>
            <div class="form-group">
                <label class="form-label">User ID</label>
                <input type="text" class="form-control" id="userIdInput" oninput="liveCheckUserId()" autocomplete="off">
                <div class="user-greeting" id="userGreeting"></div>
            </div>
            <div class="form-group" style="margin-bottom: 35px;">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="passwordInput">
            </div>
            <button class="btn-flat" onclick="performLogin()">Login</button>
        </div>
    </div>


    <div class="main-screen" id="mainScreen">
        <header>
            <div class="header-main">溫室花花實驗室</div>
            <div class="header-sub">Sincerely Yours</div>
            <div class="header-badge">雲端簽核管理系統</div>
            <div class="logout-link" onclick="performLogout()">登出</div>
        </header>

        <div class="identity-bar">
            <div>USER：<span id="currentIdentityText" class="identity-user"></span></div>
            <div>💎</div>
        </div>

        <nav id="systemNavbar">
            <div class="nav-tab active" id="tab-news" onclick="switchPanel('news')">NEWS</div>
            <div class="nav-tab" id="tab-overview" onclick="switchPanel('overview')">事件總覽</div>
            <div class="nav-tab" id="tab-apply" onclick="switchPanel('apply')">提交申請</div>
            <div class="nav-tab" id="tab-manage" onclick="switchPanel('manage')">登入管理</div>
        </nav>


        <div class="content-panel active" id="panel-news">
            <div class="panel-header">NEWS</div>
            
            <div class="card-node" id="adminNewsOp" style="display:none; margin-bottom: 20px;">
                <div class="form-group" style="margin-bottom:12px;">
                    <input type="text" class="form-control" id="newsInputArea" placeholder="輸入公告內容...">
                    <div class="file-upload-wrapper">
                        <label class="file-label" for="newsFile">📎 夾帶檔案 (圖片)</label>
                        <input type="file" id="newsFile" class="file-input" accept="image/*" onchange="previewFile(this, 'newsPreview')">
                        <div id="newsPreview" class="file-preview-area"></div>
                    </div>
                </div>
                <button class="btn-flat" style="padding:10px 20px; font-size:0.8rem; width:auto;" onclick="createNews()">確認發佈公告</button>
            </div>

            <div class="card-node" id="newsListContainer" style="padding: 4px 18px;"></div>
        </div>


        <div class="content-panel" id="panel-overview">
            <div class="panel-header">事件總覽</div>
            
            <div class="filter-group">
                <select class="form-control" id="eventFilterSelect" onchange="fillEventsData()">
                    <option value="全部">全部</option>
                    <option value="簽核中">簽核中</option>
                    <option value="已核准">已核准</option>
                    <option value="已駁回">已駁回</option>
                    <option value="已取消">已取消</option>
                </select>
            </div>

            <div class="card-node" style="padding: 4px 18px;">
                <div id="eventsContainer"></div>
            </div>
        </div>


        <div class="content-panel" id="panel-apply">
            <div class="panel-header">提交申請</div>
            <div class="card-node">
                
                <div class="form-group">
                    <label class="form-label" style="margin-bottom: 12px;">1、事件項目</label>
                    <select class="form-control" id="appItemSelect" onchange="handleSelectColorChange(this); linkValidationContent();">
                        <option value="">-- 請選擇項目 --</option>
                        <option value="關於我們">關於我們</option>
                        <option value="臨時自由散漫">臨時自由散漫</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" style="margin-bottom: 12px;">2、驗證內容</label>
                    <input type="text" class="form-control" id="validationContent" readonly style="color: var(--moss-green); font-weight:700;">
                </div>
                
                <div class="form-group">
                    <label class="form-label" style="margin-bottom: 12px;">3、申請備註</label>
                    <input type="text" class="form-control" id="appNoteInput" placeholder="別管😍 我們很 free">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">4、上傳證明文件(Optional)</label>
                    <div class="file-upload-wrapper">
                        <label class="file-label" for="applyFile">📎 選擇檔案圖片</label>
                        <input type="file" id="applyFile" class="file-input" accept="image/*" onchange="previewFile(this, 'applyPreview')">
                        <div id="applyPreview" class="file-preview-area"></div>
                    </div>
                </div>

                <div style="margin-bottom: 24px; padding-left: 2px;">
                    <span style="font-size:0.72rem; color:var(--mist-grey); display:block; line-height:1.4;">
                        💡 小提醒：自動擷取GPS定位
                    </span>
                </div>

                <button class="btn-flat" onclick="createApplication()">確認送出</button>
            </div>
        </div>


        <div class="content-panel" id="panel-manage">
            <div class="panel-header">登入管理</div>
            <div class="card-node" id="adminUserSection" style="display:none;">
                <div style="font-size:0.8rem; color:var(--moss-green); margin-bottom:15px; font-weight:700;">手動新增實驗室夥伴</div>
                <div style="display:flex; gap:12px; margin-bottom:24px; align-items: flex-end;">
                    <div style="flex:1;"><input type="text" class="form-control" id="newUid" placeholder="人員 ID" style="font-size:0.8rem;"></div>
                    <div style="flex:1;"><input type="text" class="form-control" id="newPwd" placeholder="密碼" style="font-size:0.8rem;"></div>
                    <div style="flex:1;"><input type="text" class="form-control" id="newNick" placeholder="暱稱" style="font-size:0.8rem;"></div>
                    <div><button class="btn-action-link" style="padding-bottom:10px; font-weight:700;" onclick="createNewUser()">新增</button></div>
                </div>
                
                <label style="font-size:0.75rem; color:var(--mist-grey); display:block; margin-bottom:12px;">夥伴編輯清單 (各欄位格線嚴格對齊，變更直接儲存)</label>
                <div id="partnerListContainer"></div>
            </div>
        </div>
    </div>

    <footer>
        © Sincerely Yours 溫室花花實驗室 - 我們很 free 專案小組
    </footer>


    <script>
        // 核心內建持久化資料庫：管理員（yyen77 / 960430）、使用者（yychiii_ / 0912）
        if (!localStorage.getItem('wh_users')) {
            localStorage.setItem('wh_users', JSON.stringify({
                'yyen77': { pwd: '960430', nickname: 'yyen77', role: 'admin' },
                'yychiii_': { pwd: '0912', nickname: 'yychiii_', role: 'applicant' }
            }));
        }
        if (!localStorage.getItem('wh_news')) {
            localStorage.setItem('wh_news', JSON.stringify([
                { id: 201, time: '2026-05-27 12:00', text: '別管😍 溫室花花實驗室雲端簽核系統已更新公告機制。', fileData: null, comments: [] }
            ]));
        }
        if (!localStorage.getItem('wh_events')) {
            localStorage.setItem('wh_events', JSON.stringify([]));
        }

        const validationRules = { '關於我們': '愛、勇氣、希望', '臨時自由散漫': '總匯三明治', '其他': 'LUV U, etc.' };
        let sessionUser = null;
        let tempBase64Data = {}; 

        // 登入前動態識別 USER ID 歡迎字樣
        function liveCheckUserId() {
            const uid = document.getElementById('userIdInput').value.trim();
            const greeting = document.getElementById('userGreeting');
            const users = JSON.parse(localStorage.getItem('wh_users'));

            if (users[uid]) {
                greeting.innerText = `歡迎回來，${users[uid].nickname} 💎`;
            } else {
                greeting.innerText = '';
            }
        }

        function handleSelectColorChange(el) {
            if (el.value !== "") {
                el.classList.add('selected');
            } else {
                el.classList.remove('selected');
            }
        }

        function performLogin() {
            const uid = document.getElementById('userIdInput').value.trim();
            const pwd = document.getElementById('passwordInput').value.trim();
            const users = JSON.parse(localStorage.getItem('wh_users'));

            if (users[uid] && users[uid].pwd === pwd) {
                sessionUser = { id: uid, ...users[uid] };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'flex';
                
                document.getElementById('currentIdentityText').innerText = `${sessionUser.id} (${sessionUser.nickname})`;

                initPanelPrivileges();
                linkValidationContent();
                switchPanel('news');
                
                window.addEventListener('storage', handleCrossDeviceSync);
                window.localPollTimer = setInterval(syncDataPoll, 2000);
            } else {
                alert('密碼驗證失敗或帳號不存在！');
            }
        }

        function performLogout() {
            window.removeEventListener('storage', handleCrossDeviceSync);
            clearInterval(window.localPollTimer);
            sessionUser = null;
            document.getElementById('userIdInput').value = '';
            document.getElementById('passwordInput').value = '';
            document.getElementById('userGreeting').innerText = '';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainScreen').style.display = 'none';
        }

        function handleCrossDeviceSync(e) {
            if (['wh_news', 'wh_events', 'wh_users'].includes(e.key)) {
                syncDataPoll();
            }
        }

        function syncDataPoll() {
            const activeTab = document.querySelector('.content-panel.active');
            if (!activeTab) return;
            if (activeTab.id === 'panel-news') fillNewsData();
            if (activeTab.id === 'panel-overview') fillEventsData();
            if (activeTab.id === 'panel-manage') fillPartnersData();
        }

        function initPanelPrivileges() {
            const isAdmin = (sessionUser.role === 'admin');
            const navbar = document.getElementById('systemNavbar');
            
            if (isAdmin) {
                navbar.classList.remove('three-tabs');
                document.getElementById('tab-manage').style.display = 'block';
                document.getElementById('adminNewsOp').style.display = 'block';
                document.getElementById('adminUserSection').style.display = 'block';
            } else {
                navbar.classList.add('three-tabs');
                document.getElementById('tab-manage').style.display = 'none';
                document.getElementById('adminNewsOp').style.display = 'none';
                document.getElementById('adminUserSection').style.display = 'none';
            }
        }

        function switchPanel(panelId) {
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.content-panel').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${panelId}`).classList.add('active');
            document.getElementById(`panel-${panelId}`).classList.add('active');
            
            if (panelId === 'news') fillNewsData();
            if (panelId === 'overview') fillEventsData();
            if (panelId === 'manage') fillPartnersData();
        }

        function previewFile(inputEl, previewId) {
            const file = inputEl.files[0];
            const previewContainer = document.getElementById(previewId);
            previewContainer.innerHTML = '';
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempBase64Data[previewId] = e.target.result;
                    const img = document.createElement('img');
                    img.className = 'preview-img';
                    img.src = e.target.result;
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        }

        // --- NEWS 模組邏輯 ---
        function fillNewsData() {
            const news = JSON.parse(localStorage.getItem('wh_news'));
            const container = document.getElementById('newsListContainer');
            if (document.activeElement && document.activeElement.classList.contains('comment-input-field')) return;

            container.innerHTML = news.length === 0 ? '<p style="font-size:0.8rem; color:var(--mist-grey); padding:20px 0;">暫無公告</p>' : '';

            news.forEach(item => {
                const div = document.createElement('div');
                div.className = 'news-item';
                const isAdmin = (sessionUser.role === 'admin');

                let commentsHtml = '';
                if (item.comments && item.comments.length > 0) {
                    item.comments.forEach((c, cIdx) => {
                        let adminReplyArea = c.reply ? `<div class="comment-reply"><strong>✍️ ${c.replyUser}：</strong>${c.reply}</div>` : '';
                        let replyBtn = (isAdmin && !c.reply) ? `<button class="btn-action-link" style="font-size:0.7rem; font-weight:bold;" onclick="replyComment(${item.id}, ${cIdx})">回覆</button>` : '';
                        
                        commentsHtml += `
                            <div class="comment-line">
                                <span class="comment-user">${c.user}：</span> ${c.text} ${replyBtn}
                                ${adminReplyArea}
                            </div>
                        `;
                    });
                }

                let imgHtml = item.fileData ? `<div style="margin-top:8px;"><img src="${item.fileData}" style="max-width:100%; max-height:150px; border:1px solid var(--border-line); padding:2px;"></div>` : '';

                div.innerHTML = `
                    <div class="news-meta">
                        <span>⏱️ ${item.time}</span>
                        ${isAdmin ? `<span style="color:var(--danger-text); cursor:pointer;" onclick="removeNews(${item.id})">刪除</span>` : ''}
                    </div>
                    <div class="news-body">${item.text} ${imgHtml}</div>
                    
                    <div class="comment-container">
                        <div class="comment-title">Comments</div>
                        ${commentsHtml || '<div style="color:var(--mist-grey); font-size:0.72rem; margin-bottom:4px;">No comments yet</div>'}
                        <div class="comment-input-group">
                            <input type="text" class="form-control comment-input-field" id="cInput-${item.id}" placeholder="留下您的回應...">
                            <button class="btn-action-link" style="font-weight:700;" onclick="submitComment(${item.id})">發送</button>
                        </div>
                        <div class="file-upload-wrapper" style="margin-top:6px;">
                            <label class="file-label" style="font-size:0.7rem; color:var(--mist-grey);" for="cFile-${item.id}">📎 夾帶圖片</label>
                            <input type="file" id="cFile-${item.id}" class="file-input" accept="image/*" onchange="uploadCommentFile(${item.id}, this)">
                            <div id="cPrev-${item.id}" class="file-preview-area"></div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function createNews() {
            const text = document.getElementById('newsInputArea').value.trim();
            if (!text) return;
            const news = JSON.parse(localStorage.getItem('wh_news'));
            const timeStr = new Date().toLocaleString('zh-TW', { hour12: false }).replace(/\//g, '-');
            const attachedFile = tempBase64Data['newsPreview'] || null;
            
            news.unshift({ id: Date.now(), time: timeStr, text: text, fileData: attachedFile, comments: [] });
            localStorage.setItem('wh_news', JSON.stringify(news));
            
            document.getElementById('newsInputArea').value = '';
            document.getElementById('newsPreview').innerHTML = '';
            delete tempBase64Data['newsPreview'];
            fillNewsData();
        }

        function removeNews(id) {
            let news = JSON.parse(localStorage.getItem('wh_news'));
            news = news.filter(n => n.id !== id);
            localStorage.setItem('wh_news', JSON.stringify(news));
            fillNewsData();
        }

        function submitComment(newsId) {
            const input = document.getElementById(`cInput-${newsId}`);
            const text = input.value.trim();
            const attachedFile = tempBase64Data[`cPrev-${newsId}`] || null;
            if (!text && !attachedFile) return;

            const news = JSON.parse(localStorage.getItem('wh_news'));
            const target = news.find(n => n.id === newsId);
            if (target) {
                let textWithImg = text;
                if (attachedFile) {
                    textWithImg += `<br><img src="${attachedFile}" style="max-width:120px; display:block; margin-top:4px; border:1px solid var(--border-line);">`;
                }
                target.comments.push({
                    user: `${sessionUser.id} (${sessionUser.nickname})`,
                    text: textWithImg,
                    reply: null,
                    replyUser: null
                });
                localStorage.setItem('wh_news', JSON.stringify(news));
                input.value = '';
                if (document.getElementById(`cPrev-${newsId}`)) document.getElementById(`cPrev-${newsId}`).innerHTML = '';
                delete tempBase64Data[`cPrev-${newsId}`];
                fillNewsData();
            }
        }

        function uploadCommentFile(newsId, input) {
            previewFile(input, `cPrev-${newsId}`);
        }

        function replyComment(newsId, commentIdx) {
            const replyText = prompt('管理員回覆內容：');
            if (replyText === null || replyText.trim() === "") return;

            const news = JSON.parse(localStorage.getItem('wh_news'));
            const target = news.find(n => n.id === newsId);
            if (target && target.comments && target.comments[commentIdx]) {
                target.comments[commentIdx].reply = replyText.trim();
                target.comments[commentIdx].replyUser = `${sessionUser.id} (${sessionUser.nickname})`;
                localStorage.setItem('wh_news', JSON.stringify(news));
                fillNewsData();
            }
        }

        // --- 提交申請與事件足跡模組 ---
        function linkValidationContent() {
            const item = document.getElementById('appItemSelect').value;
            document.getElementById('validationContent').value = validationRules[item] || '';
        }

        function createApplication() {
            const item = document.getElementById('appItemSelect').value;
            const valid = document.getElementById('validationContent').value;
            const note = document.getElementById('appNoteInput').value || '別管😍 我們很 free';
            const timeStr = new Date().toLocaleString('zh-TW', { hour12: false }).replace(/\//g, '-');
            const attachedFile = tempBase64Data['applyPreview'] || null;

            if (!item) { alert('請填寫事件項目'); return; }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { executeAppSave(item, valid, note, timeStr, attachedFile, pos.coords.latitude.toFixed(4), pos.coords.longitude.toFixed(4)); },
                    () => { executeAppSave(item, valid, note, timeStr, attachedFile, "23.4795", "120.4411"); }
                );
            } else {
                executeAppSave(item, valid, note, timeStr, attachedFile, "23.4795", "120.4411");
            }
        }

        function executeAppSave(item, valid, note, time, file, lat, lng) {
            const events = JSON.parse(localStorage.getItem('wh_events'));
            events.unshift({
                id: Date.now(),
                applicantId: sessionUser.id,
                applicantNick: sessionUser.nickname,
                item: item,
                validation: valid,
                note: note,
                submitTime: time,
                approveTime: null,
                status: '簽核中',
                rejectReason: null,
                fileData: file,
                gps: `${lat}, ${lng}`
            });
            localStorage.setItem('wh_events', JSON.stringify(events));
            
            document.getElementById('appNoteInput').value = '';
            document.getElementById('appItemSelect').value = '';
            document.getElementById('appItemSelect').classList.remove('selected');
            document.getElementById('validationContent').value = '';
            document.getElementById('applyPreview').innerHTML = '';
            delete tempBase64Data['applyPreview'];
            
            alert(`提交申請成功！足跡已留存。`);
            switchPanel('overview');
        }

        function fillEventsData() {
            const events = JSON.parse(localStorage.getItem('wh_events'));
            const filterValue = document.getElementById('eventFilterSelect').value;
            const container = document.getElementById('eventsContainer');
            container.innerHTML = '';

            let filtered = (sessionUser.role === 'admin') ? events : events.filter(e => e.applicantId === sessionUser.id);

            if (filterValue !== '全部') {
                filtered = filtered.filter(e => e.status === filterValue);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div style="font-size:0.8rem; color:var(--mist-grey); text-align:center; padding:30px 0;">無歷史狀態簽核足跡</div>';
                return;
            }

            filtered.forEach(ev => {
                const div = document.createElement('div');
                div.className = 'event-node';
                
                let statusTag = `<span style="color:#CD853F;">${ev.status}</span>`;
                if (ev.status === '已核准') statusTag = `<span style="color:var(--moss-green);">${ev.status} 😍</span>`;
                if (ev.status === '已駁回') statusTag = `<span style="color:var(--danger-text); font-weight:700;">${ev.status} ❌</span>`;
                if (ev.status === '已取消') statusTag = `<span style="color:var(--mist-grey); text-decoration:line-through;">${ev.status}</span>`;

                let actionBtn = '';
                if (ev.status === '簽核中') {
                    if (sessionUser.id === ev.applicantId) {
                        actionBtn = `<button class="btn-action-link btn-action-danger" onclick="updateEventStatus(${ev.id}, '已取消')">取消申請</button>`;
                    }
                    if (sessionUser.role === 'admin') {
                        actionBtn += `
                            <span>
                                <button class="btn-action-link" style="color:var(--moss-green); font-weight:700;" onclick="updateEventStatus(${ev.id}, '已核准')">核准</button>
                                <button class="btn-action-link btn-action-danger" onclick="rejectEventPrompt(${ev.id})">駁回</button>
                            </span>`;
                    }
                }

                let reasonHtml = '';
                if (ev.status === '已駁回' && ev.rejectReason !== null) {
                    reasonHtml = `<div style="color:var(--danger-text); font-size:0.8rem; margin-top:4px;"><strong>💡 駁回原因：</strong>${ev.rejectReason}</div>`;
                }

                let imgHtml = ev.fileData ? `<div style="margin-top:6px;"><img src="${ev.fileData}" style="max-width:120px; max-height:120px; border:1px solid var(--border-line); padding:2px;"></div>` : '';

                div.innerHTML = `
                    <div class="event-top">
                        <span class="event-user">👤 ${ev.applicantId} (${ev.applicantNick})</span>
                        <span class="event-status">${statusTag}</span>
                    </div>
                    <div class="event-detail">
                        項目：${ev.item} (${ev.validation}) <br>
                        備註：${ev.note}
                        ${imgHtml}
                        ${reasonHtml}
                        <br><span style="color:var(--mist-grey); font-size:0.72rem;">📍 GPS：${ev.gps}</span>
                    </div>
                    <div class="event-time">
                        <span>送出：${ev.submitTime} ${ev.approveTime ? ` | 批核：${ev.approveTime}` : ''}</span>
                        ${actionBtn}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateEventStatus(id, targetStatus) {
            const events = JSON.parse(localStorage.getItem('wh_events'));
            const match = events.find(e => e.id === id);
            if (match) {
                match.status = targetStatus;
                match.approveTime = new Date().toLocaleString('zh-TW', { hour12: false }).replace(/\//g, '-');
                localStorage.setItem('wh_events', JSON.stringify(events));
                fillEventsData();
            }
        }

        function rejectEventPrompt(id) {
            const reason = prompt('請輸入駁回原因（若無原因請留空直接確認）：');
            if (reason === null) return; 

            const events = JSON.parse(localStorage.getItem('wh_events'));
            const match = events.find(e => e.id === id);
            if (match) {
                match.status = '已駁回';
                match.rejectReason = reason.trim() ? reason.trim() : '';
                match.approveTime = new Date().toLocaleString('zh-TW', { hour12: false }).replace(/\//g, '-');
                localStorage.setItem('wh_events', JSON.stringify(events));
                fillEventsData();
            }
        }

        // --- 登入管理功能欄：管理名冊對齊與同步模組 ---
        function createNewUser() {
            const id = document.getElementById('newUid').value.trim();
            const pwd = document.getElementById('newPwd').value.trim();
            const nick = document.getElementById('newNick').value.trim();

            if (!id || !pwd || !nick) { alert('欄位缺一不可'); return; }
            const users = JSON.parse(localStorage.getItem('wh_users'));
            if (users[id]) { alert('此帳號已存在'); return; }

            users[id] = { pwd: pwd, nickname: nick, role: 'applicant' };
            localStorage.setItem('wh_users', JSON.stringify(users));
            
            document.getElementById('newUid').value = '';
            document.getElementById('newPwd').value = '';
            document.getElementById('newNick').value = '';
            fillPartnersData();
        }

        function savePartnerEdit(id, field, value) {
            const users = JSON.parse(localStorage.getItem('wh_users'));
            if (users[id] && value.trim() !== "") {
                users[id][field] = value.trim();
                localStorage.setItem('wh_users', JSON.stringify(users));
            }
        }

        function deletePartner(id) {
            if (id === 'yyen77') return;
            if (confirm(`確認移除夥伴 [${id}]？`)) {
                const users = JSON.parse(localStorage.getItem('wh_users'));
                delete users[id];
                localStorage.setItem('wh_users', JSON.stringify(users));
                fillPartnersData();
            }
        }

        function fillPartnersData() {
            const users = JSON.parse(localStorage.getItem('wh_users'));
            const container = document.getElementById('partnerListContainer');
            container.innerHTML = '';

            Object.keys(users).forEach(id => {
                const u = users[id];
                const div = document.createElement('div');
                div.className = 'partner-row';
                div.innerHTML = `
                    <div class="partner-fields">
                        <span style="width:75px; font-weight:700; font-size:0.82rem; padding-top:6px; color:var(--moss-green); word-break:break-all;">${id}</span>
                        <input type="text" class="form-control" value="${u.pwd}" onchange="savePartnerEdit('${id}', 'pwd', this.value)">
                        <input type="text" class="form-control" value="${u.nickname}" onchange="savePartnerEdit('${id}', 'nickname', this.value)">
                    </div>
                    <div>
                        ${id === 'yyen77' ? '' : `<span style="color:var(--danger-text); font-size:0.78rem; cursor:pointer; text-decoration:underline;" onclick="deletePartner('${id}')">移除</span>`}
                    </div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
